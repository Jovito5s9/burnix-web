name: Frontend CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: frontend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      API_URL: http://127.0.0.1:3000
      APP_ORIGIN: http://127.0.0.1:3100
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Verify runtime versions
        run: |
          node --version
          npm --version

      - name: Install dependencies from lockfile
        run: npm ci

      - name: Verify installed package versions
        run: npm ls --depth=0 next react react-dom

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit and integration tests
        run: npm test

      - name: Production build
        run: npm run build

      - name: BFF production smoke test
        run: npm run test:bff

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: End-to-end tests
        run: npm run test:e2e

      - name: Upload Playwright diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7
